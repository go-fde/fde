name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  GOWORK: off  # the umbrella workspace handles go-fde via replace, not use; off-mode aligns local and CI.

jobs:
  # ---------------------------------------------------------------------------
  # Native jobs: vet + build + race-enabled test with the 100% coverage gate.
  # ---------------------------------------------------------------------------
  native:
    name: native (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout fde
        uses: actions/checkout@v4
        with:
          path: fde

      # fde's go.mod pins the sibling backends via `replace ... => ../<name>`.
      # Clone them next to the module so the directives resolve standalone,
      # exactly as they do inside the umbrella monorepo.
      - name: Checkout sibling backends
        run: |
          for r in apfs clear luks; do
            git clone --depth 1 "https://github.com/go-fde/$r.git" "$r"
          done

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: fde/go.sum

      - name: Vet
        working-directory: fde
        run: go vet ./...

      - name: Build
        working-directory: fde
        run: go build ./...

      - name: Test (race + coverage)
        working-directory: fde
        run: |
          go test -race -coverprofile=cover.out ./...
          go tool cover -func=cover.out | tail -1
          pct=$(go tool cover -func=cover.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "total coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN { exit (p+0 >= 100.0) ? 0 : 1 }' \
            || { echo "::error::coverage ${pct}% < 100.0%"; exit 1; }

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.arch }}
          path: fde/cover.out
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Emulated jobs: cross-compile per-package test binaries, run them under QEMU
  # via binfmt. Covers riscv64, loong64, ppc64le and s390x (big-endian).
  # No -race (needs cgo, unavailable cross-compiled) and no fuzzing under qemu.
  # ---------------------------------------------------------------------------
  emulated:
    name: emulated (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: riscv64
            image: debian:trixie
            qemu_cpu: rv64,v=true,vlen=128
          - arch: loong64
            image: ghcr.io/loong64/debian:trixie
            qemu_cpu: la464
          - arch: ppc64le
            image: debian:trixie
            qemu_cpu: power9
          - arch: s390x
            image: debian:trixie
            qemu_cpu: qemu
    steps:
      - name: Checkout fde
        uses: actions/checkout@v4
        with:
          path: fde

      - name: Checkout sibling backends
        run: |
          for r in apfs clear luks; do
            git clone --depth 1 "https://github.com/go-fde/$r.git" "$r"
          done

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: fde/go.sum

      - name: Register QEMU binfmt handlers
        run: docker run --rm --privileged tonistiigi/binfmt --install all

      - name: Cross-compile per-package test binaries
        working-directory: fde
        env:
          GOARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          mkdir -p _qemu_tests
          for pkg in $(go list ./...); do
            name=$(echo "$pkg" | tr '/' '_')
            CGO_ENABLED=0 GOOS=linux GOARCH="$GOARCH" \
              go test -c -cover -o "_qemu_tests/${name}.test" "$pkg"
          done
          ls -l _qemu_tests

      - name: Run test binaries under QEMU (${{ matrix.arch }})
        working-directory: fde
        run: |
          set -euo pipefail
          fail=0
          for bin in _qemu_tests/*.test; do
            [ -e "$bin" ] || continue
            echo "::group::run $bin (${{ matrix.arch }})"
            out=$(docker run --rm \
              --platform "linux/${{ matrix.arch }}" \
              -e QEMU_CPU="${{ matrix.qemu_cpu }}" \
              -v "$PWD/$bin:/test.bin:ro" \
              "${{ matrix.image }}" /test.bin -test.v) || fail=1
            echo "$out"
            pct=$(echo "$out" | grep -oE 'coverage: [0-9.]+% of statements' \
              | grep -oE '[0-9.]+' | head -1 || true)
            if [ -n "$pct" ]; then
              echo "coverage for $bin: ${pct}%"
              awk -v p="$pct" 'BEGIN { exit (p+0 >= 100.0) ? 0 : 1 }' \
                || { echo "::error::coverage ${pct}% < 100.0% for $bin"; fail=1; }
            fi
            echo "::endgroup::"
          done
          exit $fail
